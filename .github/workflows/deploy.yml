name: Build & Deploy Radar

# Publishes the STATIC, read-only dashboard to the gh-pages branch.
# build_site.py bundles index.html + config.js + dashboard.jsx + radar.json.
# config.js ships as `window.RADAR_EDIT = false` and there is no backend here,
# so the public radar can't be edited — editing only exists locally, when
# edit_server.py serves the same dashboard.jsx with the flag flipped on.
#
# One-time setup: repo Settings → Pages → Build and deployment →
#   Source = "Deploy from a branch", Branch = "gh-pages", Folder = "/ (root)".

on:
  # daily discovery + redeploy
  schedule:
    - cron: "0 6 * * *"      # 06:00 UTC every day
  # manual button in the Actions tab
  workflow_dispatch:
  # redeploy whenever the dashboard or data changes on main
  push:
    branches: [main]
    paths:
      - "web/**"
      - "build_site.py"
      - "data/**"
      - ".github/workflows/deploy.yml"

permissions:
  contents: write     # commit newly discovered items back to the repo

# never run two deploys at once; let an in-progress run finish
concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Gate the whole pipeline on the core unit tests. If dedup/trend/topic
      # logic is broken, don't scrape, commit, or deploy on top of it.
      - name: Run tests
        run: python -m unittest discover -s tests

      # Discovery only runs on the schedule or a manual trigger — NOT on
      # push. That prevents an infinite commit → push → run loop.
      - name: Run discovery
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: python runner.py

      - name: Commit any new discoveries
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          if [ -n "$(git status --porcelain data/)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/
            git commit -m "discovery: $(date -u +%Y-%m-%d) — automated scrape"
            git push
          else
            echo "no new items today"
          fi

      - name: Build static site
        run: python build_site.py

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./site
