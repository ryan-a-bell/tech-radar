<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects — Tech Radar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    /* ---- validated dark-mode viz tokens (shared with similarity.html) ---- */
    :root {
      --surface-1: #1a1a19;
      --page: #0d0d0d;
      --ink: #ffffff;
      --ink-2: #c3c2b7;
      --muted: #898781;
      --grid: #2c2c2a;
      --border: rgba(255,255,255,0.10);
      --q-tools:      #3987e5;  /* blue   */
      --q-languages:  #199e70;  /* aqua   */
      --q-techniques: #c98500;  /* yellow */
      --q-platforms:  #9085e9;  /* violet */
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      background: var(--page);
      color: var(--ink);
      font-family: "IBM Plex Mono", ui-monospace, monospace;
      font-size: 13px;
      line-height: 1.5;
    }
    #root { height: 100%; }
    a { color: var(--q-tools); }
    button { font-family: inherit; font-size: inherit; }
    .loading { display:flex; height:100%; align-items:center; justify-content:center; color:var(--muted); }
  </style>
  <!-- React + Babel from CDN — no build step, fully static. Same setup as similarity.html. -->
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
</head>
<body>
  <div id="root"><div class="loading">loading projects…</div></div>

  <script type="text/babel" data-presets="react">
const { useState, useMemo, useEffect, useRef } = React;

/* ============================================================================
 * Projects — map personal projects to the technology radar (hybrid A + C)
 *
 * Three in-page views:
 *   Projects — the board: a filterable list + a detail panel that toggles
 *              between Recommended tools (semantic OR peer-based) and Similar
 *              projects (semantic OR topics).
 *   Map      — a constellation: force-directed graph over project↔project
 *              similarity so clusters of related projects show at a glance.
 *   Tools    — the reverse index: every declared tool and the projects that
 *              use it, so you can see what a tool is load-bearing for.
 *
 * Two mapping ideas underneath:
 *   A. Declared stack   — tools a project IS using (front-matter).
 *   C. Recommender      — cosine similarity of the prose against tools (and
 *      other projects). Precomputed embeddings when data/project_similarity.json
 *      is present, else in-browser TF-IDF. Peer recs blend C with A: the tools
 *      that structurally-similar projects actually adopted.
 * ==========================================================================*/

const QUAD_COLOR = { Tools: "#3987e5", Languages: "#199e70", Techniques: "#c98500", Platforms: "#9085e9" };
const quadColor = (q) => QUAD_COLOR[q] || "#898781";

const STATUS_COLOR = { Idea: "#c98500", Active: "#199e70", Paused: "#898781", Shipped: "#3987e5", Archived: "#6b6b68" };
const STATUS_ORDER = ["Active", "Paused", "Idea", "Shipped", "Archived"];

// ---- text prep (mirrors similarity.html so the pages agree) ----------------
const STOP = new Set(("a an the and or of for to in on with without from by is are be " +
  "this that it its as at into your you our their they we can will use used using " +
  "via based over under across between not no more most other any all which who whom " +
  "open source library tool toolkit app application project framework platform so " +
  "github repo repository code python js javascript want build no yet").split(/\s+/));

function tokenize(s) {
  return (s || "")
    .toLowerCase()
    .replace(/[^a-z0-9+#.\- ]+/g, " ")
    .split(/[\s.]+/)
    .map((t) => t.replace(/^[-+#]+|[-+#]+$/g, ""))
    .filter((t) => t.length >= 2 && !STOP.has(t) && !/^\d+$/.test(t));
}
function toolText(it) {
  return [it.description, it.name, it.company || "", (it.tags || []).join(" "), (it.topics || []).join(" ")].join(" ");
}
function projectText(p) {
  return [p.name, p.blurb, p.body, (p.topics || []).join(" ")].join(" ");
}

/* One TF-IDF space over BOTH corpora so project vectors and tool vectors — and
 * projects with each other — are directly comparable. */
function buildTfIdf(toolTexts, projTexts) {
  const all = toolTexts.concat(projTexts);
  const n = all.length;
  const docs = all.map((t) => {
    const counts = new Map();
    for (const tk of tokenize(t)) counts.set(tk, (counts.get(tk) || 0) + 1);
    return counts;
  });
  const df = new Map();
  for (const counts of docs) for (const t of counts.keys()) df.set(t, (df.get(t) || 0) + 1);
  const vecs = docs.map((counts) => {
    const v = new Map();
    let norm = 0;
    for (const [t, c] of counts) {
      const idf = Math.log((1 + n) / (1 + df.get(t))) + 1;
      const w = (1 + Math.log(c)) * idf;
      v.set(t, w); norm += w * w;
    }
    norm = Math.sqrt(norm) || 1;
    for (const [t, w] of v) v.set(t, w / norm);
    return v;
  });
  return { toolVecs: vecs.slice(0, toolTexts.length), projVecs: vecs.slice(toolTexts.length) };
}
function cosine(a, b) {
  const [s, l] = a.size < b.size ? [a, b] : [b, a];
  let dot = 0;
  for (const [t, w] of s) { const o = l.get(t); if (o) dot += w * o; }
  return dot;
}
function sharedTerms(a, b, k = 4) {
  if (!a || !b) return [];
  const out = [];
  for (const [t, w] of a) { const o = b.get(t); if (o) out.push([t, w * o]); }
  out.sort((x, y) => y[1] - x[1]);
  return out.slice(0, k).map((x) => x[0]);
}
function jaccard(a, b) {
  const A = new Set(a || []), B = new Set(b || []);
  if (!A.size && !B.size) return 0;
  let inter = 0;
  for (const x of A) if (B.has(x)) inter++;
  const uni = new Set([...(a || []), ...(b || [])]).size || 1;
  return inter / uni;
}
function sharedTopics(a, b) { const B = new Set(b || []); return (a || []).filter((x) => B.has(x)); }

// ============================================================================
function App() {
  const [tools, setTools] = useState(null);
  const [projects, setProjects] = useState(null);
  const [tfidf, setTfidf] = useState(null);
  const [precomp, setPrecomp] = useState(null);    // {method, toolScores, projScores}
  const [method, setMethod] = useState("tfidf");    // "tfidf" | "precomputed"
  const [view, setView] = useState("board");        // "board" | "map" | "tools"
  const [mode, setMode] = useState("tools");        // board: "tools" | "projects"
  const [rankBy, setRankBy] = useState("semantic"); // board rank source
  const [selId, setSelId] = useState(null);
  const [topK, setTopK] = useState(6);
  const [statusFilter, setStatusFilter] = useState(null); // null = all; else Set
  const [topicFilter, setTopicFilter] = useState(() => new Set());
  const [sortBy, setSortBy] = useState("status");
  const [toolSort, setToolSort] = useState("count");
  const [mapThreshold, setMapThreshold] = useState(0.05);

  useEffect(() => {
    (async () => {
      const rj = await fetch("data/radar.json").then((r) => r.json());
      const its = (rj.items || rj).filter((x) => x && x.ring !== "Archived");
      let projs = [];
      try {
        const pj = await fetch("data/projects.json");
        if (pj.ok) projs = (await pj.json()).projects || [];
      } catch (e) { /* no projects file */ }

      const tf = buildTfIdf(its.map(toolText), projs.map(projectText));

      let pc = null;
      try {
        const s = await fetch("data/project_similarity.json");
        if (s.ok) {
          const j = await s.json();
          if (j && j.tool_ids && j.projects) {
            const toolIdx = new Map(its.map((it, i) => [it.id, i]));
            const idAlign = j.tool_ids.map((id) => toolIdx.has(id) ? toolIdx.get(id) : -1);
            const toolScores = new Map();
            for (const [pid, row] of Object.entries(j.projects)) {
              const m = new Map();
              row.forEach((v, k) => { const ti = idAlign[k]; if (ti >= 0) m.set(ti, v); });
              toolScores.set(pid, m);
            }
            const projScores = new Map();
            if (j.project_ids && j.project_matrix) {
              j.project_ids.forEach((pid, i) => {
                const m = new Map();
                (j.project_matrix[i] || []).forEach((v, k) => {
                  const other = j.project_ids[k];
                  if (other !== pid) m.set(other, v);
                });
                projScores.set(pid, m);
              });
            }
            pc = { method: j.method || "embeddings", toolScores, projScores };
          }
        }
      } catch (e) { /* no precomputed file — TF-IDF still works */ }

      setTools(its);
      setProjects(projs);
      setTfidf(tf);
      setPrecomp(pc);
      setMethod(pc ? "precomputed" : "tfidf");
      setStatusFilter(new Set(projs.map((p) => p.status)));
      setSelId(projs.length ? projs[0].id : null);
    })();
  }, []);

  // reverse index: tool id -> { tool, projects: [project] }   (feature #2)
  const toolUsage = useMemo(() => {
    const m = new Map();
    if (!projects) return m;
    for (const p of projects) for (const t of p.stack || []) {
      const e = m.get(t.id) || { tool: t, projects: [] };
      e.projects.push(p); m.set(t.id, e);
    }
    return m;
  }, [projects]);

  // dense project×project semantic similarity (precomputed embeddings or TF-IDF)
  const projSem = useMemo(() => {
    if (!projects || !tfidf) return [];
    const N = projects.length;
    const usePc = method === "precomputed" && precomp && precomp.projScores.size;
    const M = [];
    for (let i = 0; i < N; i++) {
      const row = new Float64Array(N);
      const pcRow = usePc ? precomp.projScores.get(projects[i].id) : null;
      for (let j = 0; j < N; j++) {
        if (i === j) { row[j] = 1; continue; }
        row[j] = usePc ? (pcRow ? (pcRow.get(projects[j].id) ?? 0) : 0)
                       : cosine(tfidf.projVecs[i], tfidf.projVecs[j]);
      }
      M.push(row);
    }
    return M;
  }, [projects, tfidf, precomp, method]);

  // all project neighbours of pIdx, sorted desc (why comes from TF-IDF terms)
  const neighboursAll = useMemo(() => {
    if (!projects) return () => [];
    return (pIdx, rankMode) => {
      const out = [];
      const mine = projects[pIdx];
      projects.forEach((p, j) => {
        if (j === pIdx) return;
        if (rankMode === "topics") {
          const score = jaccard(mine.topics, p.topics);
          if (score <= 0) return;
          out.push({ proj: p, idx: j, score, why: sharedTopics(mine.topics, p.topics), topic: true });
        } else {
          const score = projSem[pIdx] ? projSem[pIdx][j] : 0;
          if (score <= 0.001) return;
          out.push({ proj: p, idx: j, score, why: tfidf ? sharedTerms(tfidf.projVecs[pIdx], tfidf.projVecs[j]) : [] });
        }
      });
      out.sort((a, b) => b.score - a.score);
      return out;
    };
  }, [projects, projSem, tfidf]);

  // tool recommendations — description similarity, declared stack excluded
  const recommendTools = useMemo(() => {
    if (!tools || !projects) return () => [];
    return (proj, pIdx) => {
      const stackIds = new Set((proj.stack || []).map((s) => s.id));
      const out = [];
      if (method === "precomputed" && precomp) {
        const row = precomp.toolScores.get(proj.id);
        if (row) for (const [ti, sc] of row) {
          if (stackIds.has(tools[ti].id)) continue;
          out.push({ idx: ti, score: sc, why: [] });
        }
      } else {
        const pv = tfidf.projVecs[pIdx];
        tools.forEach((it, ti) => {
          if (stackIds.has(it.id)) return;
          const sc = cosine(pv, tfidf.toolVecs[ti]);
          if (sc > 0.001) out.push({ idx: ti, score: sc, why: sharedTerms(pv, tfidf.toolVecs[ti]) });
        });
      }
      out.sort((a, b) => b.score - a.score);
      return out.slice(0, topK);
    };
  }, [tools, projects, tfidf, precomp, method, topK]);

  // peer-based recommendations — tools that similar projects ACTUALLY use (#5)
  const recommendPeers = useMemo(() => {
    if (!projects) return () => [];
    return (proj, pIdx) => {
      const peers = neighboursAll(pIdx, "semantic").filter((x) => x.score >= 0.03).slice(0, 8);
      const stackIds = new Set((proj.stack || []).map((s) => s.id));
      const agg = new Map();
      for (const { proj: peer, score: ps } of peers) {
        for (const t of peer.stack || []) {
          if (stackIds.has(t.id)) continue;
          const e = agg.get(t.id) || { tool: t, score: 0, peers: [] };
          e.score += ps; e.peers.push({ name: peer.name, id: peer.id, score: ps });
          agg.set(t.id, e);
        }
      }
      return [...agg.values()]
        .map((e) => ({ ...e, peers: e.peers.sort((a, b) => b.score - a.score) }))
        .sort((a, b) => b.score - a.score)
        .slice(0, topK);
    };
  }, [projects, neighboursAll, topK]);

  const recommendProjects = useMemo(() => {
    if (!projects) return () => [];
    return (proj, pIdx, rankMode) => neighboursAll(pIdx, rankMode).slice(0, topK);
  }, [projects, neighboursAll, topK]);

  // visible project indices under the current status/topic filter (#1)
  const visibleIdx = useMemo(() => {
    if (!projects) return [];
    return projects.map((_, i) => i).filter((i) => {
      const p = projects[i];
      if (statusFilter && statusFilter.size && !statusFilter.has(p.status)) return false;
      if (topicFilter.size && !(p.topics || []).some((t) => topicFilter.has(t))) return false;
      return true;
    });
  }, [projects, statusFilter, topicFilter]);

  if (!tools || !projects || !tfidf) return <div className="loading">building recommendations…</div>;

  const semantic = method === "precomputed" && precomp;
  const selIdx = projects.findIndex((p) => p.id === selId);
  const sel = selIdx >= 0 ? projects[selIdx] : null;

  // rank-source options depend on what's being ranked
  const rankOptions = mode === "tools"
    ? [["semantic", "Semantic"], ["peers", "Peers"]]
    : [["semantic", "Semantic"], ["topics", "Topics"]];
  const effRank = rankOptions.some((o) => o[0] === rankBy) ? rankBy : "semantic";

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100%" }}>
      <TopBar count={projects.length} semantic={semantic}
        label={semantic ? prettyMethod(precomp.method) : "TF-IDF · in-browser"} />
      <Controls
        view={view} setView={setView}
        mode={mode} setMode={setMode}
        rankOptions={rankOptions} rankBy={effRank} setRankBy={setRankBy}
        hasPrecomp={!!precomp} method={method} setMethod={setMethod}
        precompLabel={precomp ? prettyMethod(precomp.method) : ""}
        topK={topK} setTopK={setTopK}
        mapThreshold={mapThreshold} setMapThreshold={setMapThreshold}
        toolSort={toolSort} setToolSort={setToolSort} />
      {(view === "board" || view === "map") && (
        <Filters projects={projects}
          statusFilter={statusFilter} setStatusFilter={setStatusFilter}
          topicFilter={topicFilter} setTopicFilter={setTopicFilter}
          sortBy={sortBy} setSortBy={setSortBy} showSort={view === "board"}
          visibleCount={visibleIdx.length} />
      )}

      <div style={{ flex: 1, minHeight: 0, display: "flex" }}>
        {view === "board" && (
          <>
            <ProjectList projects={projects} visibleIdx={visibleIdx} sortBy={sortBy} selId={selId} setSelId={setSelId} />
            <div style={{ flex: 1, overflow: "auto", padding: 22 }}>
              {sel
                ? <ProjectDetail proj={sel} tools={tools} toolUsage={toolUsage}
                    mode={mode} rankBy={effRank}
                    toolRecs={recommendTools(sel, selIdx)}
                    peerRecs={recommendPeers(sel, selIdx)}
                    projRecs={recommendProjects(sel, selIdx, effRank)}
                    setSelId={setSelId} />
                : <div style={{ color: "var(--muted)" }}>
                    No projects yet. Add a Markdown file under <code>projects/</code> and run{" "}
                    <code>python build_projects.py</code>.
                  </div>}
            </div>
          </>
        )}
        {view === "map" && (
          <MapView projects={projects} projSem={projSem} visibleIdx={visibleIdx}
            threshold={mapThreshold} topK={topK} selId={selId}
            setSelId={setSelId} openBoard={() => setView("board")} />
        )}
        {view === "tools" && (
          <ToolsView toolUsage={toolUsage} tools={tools} toolSort={toolSort}
            openProject={(id) => { setSelId(id); setView("board"); }} />
        )}
      </div>
      <Legend view={view} mode={mode} />
    </div>
  );
}

function prettyMethod(m) {
  if (!m) return "Precomputed";
  const [a, b] = m.split(":");
  if (a === "embeddings") return "Embeddings · " + b;
  if (a === "tf-idf") return "TF-IDF · " + b + " (precomputed)";
  return m;
}

// Shared top nav — identical tab group to dashboard.jsx / learning.jsx / similarity.html.
function TopBar({ count, semantic, label }) {
  const tab = { background: "transparent", color: "#999", border: "1px solid #444",
    textDecoration: "none", padding: "6px 14px", marginRight: 8, fontSize: 11, letterSpacing: 1 };
  return (
    <div style={{ display: "flex", gap: 0, background: "#1a1a1a", padding: "10px 14px",
      fontFamily: "'IBM Plex Mono', ui-monospace, monospace", alignItems: "center", flexWrap: "wrap" }}>
      <span style={{ color: "#777", fontSize: 11, letterSpacing: 1, marginRight: 14 }}>VIEW:</span>
      <a href="index.html#atlas" style={tab}>ATLAS</a>
      <a href="index.html#index" style={tab}>INDEX</a>
      <a href="learning.html" style={tab}>LEARNING</a>
      <a href="similarity.html" style={tab}>SIMILARITY</a>
      <span style={{ background: "#fff", color: "#000", border: "1px solid #fff",
        padding: "6px 14px", fontSize: 11, letterSpacing: 1 }}>PROJECTS</span>
      <a href="people.html" style={{ ...tab, marginLeft: 8 }}>PEOPLE</a>
      <span style={{ marginLeft: "auto", fontSize: 10, letterSpacing: 1, color: semantic ? "#4ade80" : "#fbbf24" }}>
        {count} project{count === 1 ? "" : "s"} · {semantic ? "● " : "○ "}{label}
      </span>
    </div>
  );
}

function Seg({ options, value, onChange, disabled }) {
  return (
    <div style={{ display: "inline-flex", border: "1px solid var(--border)", borderRadius: 8,
      overflow: "hidden", opacity: disabled ? 0.4 : 1, pointerEvents: disabled ? "none" : "auto" }}>
      {options.map(([k, lbl], i) => {
        const on = k === value;
        return (
          <button key={k} onClick={() => onChange(k)} aria-pressed={on}
            style={{ padding: "6px 12px", fontSize: 12, cursor: "pointer", border: 0,
              borderRight: i < options.length - 1 ? "1px solid var(--border)" : 0,
              background: on ? "rgba(57,135,229,0.16)" : "transparent",
              color: on ? "#fff" : "var(--ink-2)",
              boxShadow: on ? "inset 0 -2px 0 var(--q-tools)" : "none" }}>{lbl}</button>
        );
      })}
    </div>
  );
}

function Controls({ view, setView, mode, setMode, rankOptions, rankBy, setRankBy,
  hasPrecomp, method, setMethod, precompLabel, topK, setTopK, mapThreshold, setMapThreshold,
  toolSort, setToolSort }) {
  const wrap = { display: "flex", gap: 18, alignItems: "center", padding: "8px 14px",
    borderBottom: "1px solid var(--border)", color: "var(--muted)", flexWrap: "wrap" };
  const k = { fontSize: 12, textTransform: "uppercase", letterSpacing: 0.5 };
  return (
    <div style={wrap}>
      <Seg options={[["board", "Projects"], ["map", "Map"], ["tools", "Tools"]]} value={view} onChange={setView} />
      <span style={{ width: 1, alignSelf: "stretch", background: "var(--border)" }} />

      {view === "board" && (
        <>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span style={k}>Show</span>
            <Seg options={[["tools", "Recommended tools"], ["projects", "Similar projects"]]} value={mode} onChange={setMode} />
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span style={k}>Rank by</span>
            <Seg options={rankOptions} value={rankBy} onChange={setRankBy} />
          </div>
        </>
      )}

      {view === "map" && (
        <label>min link{" "}
          <input type="range" min="0.02" max="0.6" step="0.01" value={mapThreshold}
            onChange={(e) => setMapThreshold(+e.target.value)} /> {mapThreshold.toFixed(2)}</label>
      )}

      {view === "tools" && (
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <span style={k}>Sort</span>
          <Seg options={[["count", "Most used"], ["name", "Name"]]} value={toolSort} onChange={setToolSort} />
        </div>
      )}

      {hasPrecomp && view !== "tools" && (
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <span style={k}>Semantic src</span>
          <Seg options={[["precomputed", precompLabel + " ✦"], ["tfidf", "TF-IDF"]]} value={method} onChange={setMethod} />
        </div>
      )}

      {view !== "tools" && (
        <label>top{" "}
          <input type="range" min="3" max="12" value={topK} onChange={(e) => setTopK(+e.target.value)} /> {topK}</label>
      )}

      <span style={{ fontSize: 12, marginLeft: "auto" }}>{controlHint(view, mode, rankBy)}</span>
    </div>
  );
}
function controlHint(view, mode, rankBy) {
  if (view === "map") return "each node is a project; links connect similar projects — drag, scroll to zoom";
  if (view === "tools") return "every declared tool and the projects that depend on it";
  if (mode === "tools") return rankBy === "peers"
    ? "tools that projects similar to this one actually use"
    : "tools ranked by similarity to the description; declared stack excluded";
  return rankBy === "topics" ? "projects sharing topic tags (Jaccard overlap)"
    : "projects that resemble this one — semantic match spots kinship across topic areas";
}

// ---- filters (feature #1) --------------------------------------------------
function Filters({ projects, statusFilter, setStatusFilter, topicFilter, setTopicFilter, sortBy, setSortBy, showSort, visibleCount }) {
  const statuses = useMemo(() =>
    [...new Set(projects.map((p) => p.status))].sort((a, b) => STATUS_ORDER.indexOf(a) - STATUS_ORDER.indexOf(b)),
    [projects]);
  const topics = useMemo(() => [...new Set(projects.flatMap((p) => p.topics || []))].sort(), [projects]);

  const toggleStatus = (s) => {
    const base = statusFilter || new Set(statuses);
    const next = new Set(base);
    next.has(s) ? next.delete(s) : next.add(s);
    if (next.size) setStatusFilter(next);   // never empty — like the radar's quadrant filter
  };
  const toggleTopic = (t) => {
    const next = new Set(topicFilter);
    next.has(t) ? next.delete(t) : next.add(t);
    setTopicFilter(next);                    // empty = no topic filter
  };
  const active = statusFilter || new Set(statuses);

  const pill = (on, color) => ({
    display: "inline-flex", alignItems: "center", gap: 6, padding: "3px 9px", borderRadius: 20,
    cursor: "pointer", fontSize: 11, opacity: on ? 1 : 0.4,
    border: "1px solid " + (color || "var(--border)"), background: "transparent", color: "var(--ink-2)",
  });

  return (
    <div style={{ display: "flex", gap: 14, alignItems: "center", padding: "8px 14px",
      borderBottom: "1px solid var(--border)", color: "var(--muted)", flexWrap: "wrap" }}>
      <span style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: 0.5 }}>status</span>
      {statuses.map((s) => (
        <button key={s} onClick={() => toggleStatus(s)} style={pill(active.has(s), STATUS_COLOR[s])}>
          <span style={{ width: 8, height: 8, borderRadius: "50%", background: STATUS_COLOR[s] }} />{s}
        </button>
      ))}
      {topics.length > 0 && <span style={{ width: 1, alignSelf: "stretch", background: "var(--border)" }} />}
      {topics.length > 0 && <span style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: 0.5 }}>topic</span>}
      {topics.map((t) => (
        <button key={t} onClick={() => toggleTopic(t)} style={pill(topicFilter.size === 0 || topicFilter.has(t))}>{t}</button>
      ))}
      <span style={{ marginLeft: "auto", display: "flex", gap: 12, alignItems: "center" }}>
        <span style={{ fontSize: 11 }}>{visibleCount} shown</span>
        {showSort && (
          <label style={{ fontSize: 12 }}>sort{" "}
            <select value={sortBy} onChange={(e) => setSortBy(e.target.value)}
              style={{ background: "var(--page)", color: "var(--ink)", border: "1px solid var(--border)",
                borderRadius: 5, padding: "3px 6px", fontFamily: "inherit", fontSize: 12 }}>
              <option value="status">Status</option>
              <option value="name">Name</option>
              <option value="stack">Stack size</option>
            </select>
          </label>
        )}
      </span>
    </div>
  );
}

function ProjectList({ projects, visibleIdx, sortBy, selId, setSelId }) {
  const ordered = useMemo(() => {
    const idx = [...visibleIdx];
    idx.sort((a, b) => {
      const pa = projects[a], pb = projects[b];
      if (sortBy === "name") return pa.name.localeCompare(pb.name);
      if (sortBy === "stack") return (pb.stack || []).length - (pa.stack || []).length;
      const d = STATUS_ORDER.indexOf(pa.status) - STATUS_ORDER.indexOf(pb.status);
      return d !== 0 ? d : pa.name.localeCompare(pb.name);
    });
    return idx;
  }, [visibleIdx, sortBy, projects]);

  return (
    <div style={{ width: 250, borderRight: "1px solid var(--border)", overflow: "auto" }}>
      {ordered.map((i) => {
        const p = projects[i];
        const on = p.id === selId;
        return (
          <div key={p.id} onClick={() => setSelId(p.id)}
            style={{ padding: "10px 12px", cursor: "pointer",
              background: on ? "rgba(57,135,229,0.15)" : "transparent",
              borderBottom: "1px solid rgba(255,255,255,0.04)" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 7 }}>
              <StatusDot status={p.status} />
              <span style={{ whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{p.name}</span>
            </div>
            <div style={{ color: "var(--muted)", fontSize: 11, marginTop: 2 }}>
              {p.status}{p.stack && p.stack.length ? " · " + p.stack.length + " tools" : " · no stack"}
            </div>
          </div>
        );
      })}
      {!ordered.length && <div style={{ padding: 12, color: "var(--muted)" }}>no projects match the filter</div>}
    </div>
  );
}

function StatusDot({ status }) {
  return <span style={{ width: 9, height: 9, borderRadius: "50%", background: STATUS_COLOR[status] || "#898781", flex: "0 0 auto" }} />;
}
function StatusBadge({ status }) {
  const c = STATUS_COLOR[status] || "#898781";
  return (
    <span style={{ display: "inline-flex", alignItems: "center", gap: 6, padding: "3px 9px",
      borderRadius: 20, border: "1px solid " + c, color: c, fontSize: 11, letterSpacing: 0.5 }}>
      <span style={{ width: 7, height: 7, borderRadius: "50%", background: c }} />{status}
    </span>
  );
}

function ProjectDetail({ proj, tools, toolUsage, mode, rankBy, toolRecs, peerRecs, projRecs, setSelId }) {
  return (
    <div style={{ maxWidth: 760 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap" }}>
        <strong style={{ fontSize: 20 }}>{proj.name}</strong>
        <StatusBadge status={proj.status} />

        ))}
      </div>
      {proj.repo && <a href={proj.repo} target="_blank" style={{ fontSize: 12 }}>{proj.repo}</a>}
      <div style={{ color: "var(--ink-2)", margin: "12px 0 4px" }}>{proj.blurb}</div>

            <a key={s.id} href={s.url || "#"} target={s.url ? "_blank" : undefined}

                textDecoration: "none", color: "var(--ink)", border: "1px solid " + quadColor(s.quadrant), background: "rgba(255,255,255,0.02)" }}>
              <span style={{ width: 9, height: 9, borderRadius: 2, background: quadColor(s.quadrant) }} />

            </a>
          ))}
        </div>
      ) : (
        <div style={{ color: "var(--muted)", marginTop: 8 }}>

        </div>
      )}

        <div style={{ color: "#fbbf24", fontSize: 12, marginTop: 8 }}>

function UsageNote({ usage, exclude, setSelId }) {
  if (!usage) return null;
  const others = usage.projects.filter((p) => p.id !== exclude);
  if (!others.length) return null;
  return (
    <span>  · used by {others.map((p, i) => (
      <span key={p.id}>
        <a onClick={(e) => { e.preventDefault(); setSelId(p.id); }} href="#" style={{ fontSize: 12 }}>{p.name}</a>
        {i < others.length - 1 ? ", " : ""}
      </span>
    ))}</span>
  );
}

function ToolRecs({ proj, tools, recs, toolUsage, setSelId }) {

    <>
      <SectionTitle>{proj.stack && proj.stack.length ? "Recommended — tools you might add" : "Recommended tech stack"}</SectionTitle>
      <div style={{ marginTop: 8 }}>
        {recs.map(({ idx, score, why }) => {
          const it = tools[idx];
          const topicMatch = (it.topics || []).some((t) => (proj.topics || []).includes(t));
          return (
            <div key={it.id} style={{ padding: "10px 0", borderTop: "1px solid var(--border)" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ width: 9, height: 9, borderRadius: 2, background: quadColor(it.quadrant) }} />
                <strong>{it.name}</strong>
                <span style={{ color: "var(--muted)", fontSize: 12 }}>{it.quadrant} · {it.ring}</span>
                {topicMatch && <span style={{ fontSize: 10, color: "#4ade80", border: "1px solid rgba(74,222,128,0.4)", borderRadius: 10, padding: "1px 6px" }}>topic match</span>}
                <span style={{ flex: 1 }} />
                <span style={{ fontVariantNumeric: "tabular-nums", color: "var(--ink-2)" }}>{score.toFixed(3)}</span>
              </div>
              <div style={{ height: 4, background: "var(--grid)", borderRadius: 2, margin: "5px 0" }}>
                <div style={{ height: "100%", width: (Math.min(1, score) * 100) + "%", background: quadColor(it.quadrant), borderRadius: 2 }} />
              </div>
              <div style={{ color: "var(--muted)", fontSize: 12 }}>
                {it.description}
                {why && why.length ? <span style={{ color: "#6da7ec" }}>  · shared: {why.join(", ")}</span> : null}
                <UsageNote usage={toolUsage.get(it.id)} exclude={proj.id} setSelId={setSelId} />

              </div>

      </div>
    </>

}

// ---- constellation map (feature #4) ----------------------------------------
function MapView({ projects, projSem, visibleIdx, threshold, topK, selId, setSelId, openBoard }) {
  const canvasRef = useRef(null);
  const stateRef = useRef({ nodes: [], edges: [], cam: { x: 0, y: 0, z: 1 } });
  const [hover, setHover] = useState(null);
  const dragRef = useRef(null);
  const panRef = useRef(null);

  const graph = useMemo(() => {
    const vis = visibleIdx;
    const visSet = new Set(vis);
    const nodes = vis.map((i) => ({ i, x: (Math.random() - 0.5) * 300, y: (Math.random() - 0.5) * 300, vx: 0, vy: 0 }));
    const pos = new Map(nodes.map((nd, k) => [nd.i, k]));
    const edgeSet = new Set();
    const edges = [];
    for (const nd of nodes) {
      const nbrs = vis.filter((j) => j !== nd.i)
        .map((j) => [j, projSem[nd.i] ? projSem[nd.i][j] : 0])
        .filter(([, s]) => s >= threshold)
        .sort((a, b) => b[1] - a[1])
        .slice(0, topK);
      for (const [j, s] of nbrs) {
        if (!visSet.has(j)) continue;
        const key = nd.i < j ? nd.i + "-" + j : j + "-" + nd.i;
        if (edgeSet.has(key)) continue;
        edgeSet.add(key);
        edges.push({ a: pos.get(nd.i), b: pos.get(j), s });
      }
    }
    return { nodes, edges };
  }, [visibleIdx, projSem, threshold, topK]);

  useEffect(() => { stateRef.current.nodes = graph.nodes; stateRef.current.edges = graph.edges; }, [graph]);

  useEffect(() => {
    const canvas = canvasRef.current;
    const ctx = canvas.getContext("2d");
    let raf, alpha = 1, running = true;
    const resize = () => {
      const r = canvas.parentElement.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      canvas.width = r.width * dpr; canvas.height = r.height * dpr;
      canvas.style.width = r.width + "px"; canvas.style.height = r.height + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    };
    resize();
    window.addEventListener("resize", resize);

    function step() {
      const { nodes, edges, cam } = stateRef.current;
      const N = nodes.length;
      if (alpha > 0.004 && N) {
        for (let a = 0; a < N; a++) {
          const na = nodes[a];
          for (let b = a + 1; b < N; b++) {
            const nb = nodes[b];
            let dx = na.x - nb.x, dy = na.y - nb.y;
            let d2 = dx * dx + dy * dy || 0.01;
            const f = 5200 / d2;
            const d = Math.sqrt(d2);
            dx /= d; dy /= d;
            na.vx += dx * f; na.vy += dy * f;
            nb.vx -= dx * f; nb.vy -= dy * f;
          }
        }
        for (const e of edges) {
          const na = nodes[e.a], nb = nodes[e.b];
          let dx = nb.x - na.x, dy = nb.y - na.y;
          const d = Math.hypot(dx, dy) || 0.01;
          const rest = 70 + (1 - e.s) * 150;
          const f = (d - rest) * 0.02 * (0.4 + e.s);
          dx /= d; dy /= d;
          na.vx += dx * f; na.vy += dy * f;
          nb.vx -= dx * f; nb.vy -= dy * f;
        }
        for (const nd of nodes) {
          nd.vx += -nd.x * 0.003; nd.vy += -nd.y * 0.003;
          nd.vx *= 0.85; nd.vy *= 0.85;
          if (dragRef.current && dragRef.current.k === nd) continue;
          nd.x += nd.vx * alpha; nd.y += nd.vy * alpha;
        }
        alpha *= 0.992;
      }
      const w = canvas.clientWidth, h = canvas.clientHeight;
      ctx.clearRect(0, 0, w, h);
      ctx.save();
      ctx.translate(w / 2 + cam.x, h / 2 + cam.y);
      ctx.scale(cam.z, cam.z);

      const hi = hover != null ? hover : (selId != null ? nodes.findIndex((nd) => projects[nd.i].id === selId) : -1);
      const hiSet = new Set();
      if (hi >= 0) { hiSet.add(hi); for (const e of edges) { if (e.a === hi) hiSet.add(e.b); if (e.b === hi) hiSet.add(e.a); } }

      for (const e of edges) {
        const na = nodes[e.a], nb = nodes[e.b];
        const on = hi < 0 || e.a === hi || e.b === hi;
        ctx.strokeStyle = on ? `rgba(180,190,205,${0.14 + e.s * 0.6})` : "rgba(120,125,135,0.06)";
        ctx.lineWidth = on ? 0.5 + e.s * 2.5 : 0.4;
        ctx.beginPath(); ctx.moveTo(na.x, na.y); ctx.lineTo(nb.x, nb.y); ctx.stroke();
      }
      for (let k = 0; k < nodes.length; k++) {
        const nd = nodes[k];
        const p = projects[nd.i];
        const dim = hi >= 0 && !hiSet.has(k);
        const r = 6 + Math.min(10, (p.stack || []).length * 1.7);
        ctx.globalAlpha = dim ? 0.25 : 1;
        ctx.fillStyle = STATUS_COLOR[p.status] || "#898781";
        ctx.beginPath(); ctx.arc(nd.x, nd.y, r, 0, Math.PI * 2); ctx.fill();
        if (k === hi) { ctx.strokeStyle = "#fff"; ctx.lineWidth = 1.5; ctx.stroke(); }
        ctx.globalAlpha = dim ? 0.35 : 1;
        ctx.fillStyle = "#e8e8e2";
        ctx.font = (k === hi ? "600 " : "") + "11px 'IBM Plex Mono', monospace";
        ctx.fillText(p.name, nd.x + r + 4, nd.y + 3);
      }
      ctx.globalAlpha = 1;
      ctx.restore();
      if (running) raf = requestAnimationFrame(step);
    }
    step();
    return () => { running = false; cancelAnimationFrame(raf); window.removeEventListener("resize", resize); };
  }, [graph, hover, selId, projects]);

  const toWorld = (ev) => {
    const canvas = canvasRef.current;
    const r = canvas.getBoundingClientRect();
    const { cam } = stateRef.current;
    return { x: (ev.clientX - r.left - r.width / 2 - cam.x) / cam.z, y: (ev.clientY - r.top - r.height / 2 - cam.y) / cam.z };
  };
  const pick = (ev) => {
    const { x, y } = toWorld(ev);
    const { nodes } = stateRef.current;
    let best = -1, bd = 16 * 16;
    for (let k = 0; k < nodes.length; k++) {
      const nd = nodes[k];
      const d = (nd.x - x) ** 2 + (nd.y - y) ** 2;
      if (d < bd) { bd = d; best = k; }
    }
    return best;
  };
  const onDown = (ev) => {
    const k = pick(ev);
    if (k >= 0) dragRef.current = { k: stateRef.current.nodes[k], moved: false, x: ev.clientX, y: ev.clientY };
    else panRef.current = { x: ev.clientX, y: ev.clientY, cam: { ...stateRef.current.cam } };
  };
  const onMove = (ev) => {
    if (dragRef.current) {
      const { x, y } = toWorld(ev);
      dragRef.current.k.x = x; dragRef.current.k.y = y; dragRef.current.k.vx = 0; dragRef.current.k.vy = 0;
      if (Math.hypot(ev.clientX - dragRef.current.x, ev.clientY - dragRef.current.y) > 4) dragRef.current.moved = true;
    } else if (panRef.current) {
      const p = panRef.current;
      stateRef.current.cam.x = p.cam.x + (ev.clientX - p.x);
      stateRef.current.cam.y = p.cam.y + (ev.clientY - p.y);
    } else {
      const k = pick(ev);
      setHover(k >= 0 ? k : null);
      canvasRef.current.style.cursor = k >= 0 ? "pointer" : "grab";
    }
  };
  const onUp = (ev) => {
    if (dragRef.current) {
      if (!dragRef.current.moved) setSelId(projects[dragRef.current.k.i].id);
      dragRef.current = null;
    } else if (panRef.current) panRef.current = null;
  };
  const onWheel = (ev) => {
    ev.preventDefault();
    const { cam } = stateRef.current;
    cam.z = Math.max(0.3, Math.min(6, cam.z * (ev.deltaY < 0 ? 1.1 : 1 / 1.1)));
  };

  const hoverIdx = hover != null ? stateRef.current.nodes[hover]?.i : null;
  return (
    <div style={{ position: "relative", flex: 1, minHeight: 0 }}>
      <canvas ref={canvasRef}
        onPointerDown={onDown} onPointerMove={onMove} onPointerUp={onUp} onWheel={onWheel}
        style={{ display: "block", width: "100%", height: "100%", touchAction: "none", cursor: "grab" }} />
      {hoverIdx != null && (
        <div style={{ position: "absolute", left: 12, bottom: 12, maxWidth: 380, pointerEvents: "none",
          background: "rgba(20,20,19,0.95)", border: "1px solid var(--border)", borderRadius: 8, padding: "8px 10px" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
            <StatusDot status={projects[hoverIdx].status} />
            <strong>{projects[hoverIdx].name}</strong>
            <span style={{ color: "var(--muted)" }}>· {projects[hoverIdx].status} · {(projects[hoverIdx].topics || []).join(", ")}</span>
          </div>
          <div style={{ color: "var(--ink-2)", marginTop: 3 }}>{projects[hoverIdx].blurb}</div>
        </div>
      )}
      {selId != null && (
        <div style={{ position: "absolute", right: 12, top: 12 }}>
          <button onClick={openBoard} style={{ padding: "5px 11px", borderRadius: 6, cursor: "pointer",
            border: "1px solid var(--border)", background: "rgba(20,20,19,0.9)", color: "var(--ink-2)" }}>
            open selected →
          </button>
        </div>
      )}
      {visibleIdx.length < 2 && (
        <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", color: "var(--muted)" }}>
          need at least two projects in view to draw a constellation
        </div>
      )}
    </div>
  );
}

function SectionTitle({ children }) {
  return <div style={{ marginTop: 22, color: "var(--muted)", textTransform: "uppercase", letterSpacing: 0.5, fontSize: 12 }}>{children}</div>;
}

function Legend({ view, mode }) {
  const note = view === "map" ? "node size ≈ stack size · links = project similarity · drag / scroll to explore"
    : view === "tools" ? "count = projects using the tool · click a project to open it"
    : mode === "tools" ? "declared stack = using · recommended = semantic or peer match"
    : "bar = project-to-project similarity · click a project to open it";
  return (
    <div style={{ display: "flex", gap: 16, alignItems: "center", padding: "8px 14px",
      borderTop: "1px solid var(--border)", background: "var(--surface-1)", color: "var(--muted)", fontSize: 12, flexWrap: "wrap" }}>
      <span>status:</span>
      {Object.keys(STATUS_COLOR).map((s) => (
        <span key={s} style={{ display: "flex", alignItems: "center", gap: 5 }}>
          <span style={{ width: 9, height: 9, borderRadius: "50%", background: STATUS_COLOR[s] }} />{s}
        </span>
      ))}
      <span style={{ flex: 1 }} />
      <span>{note} · prototype</span>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
  </script>
</body>
</html>
